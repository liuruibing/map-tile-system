[pytest]
testpaths = tests
python_files = test_*.py *_test.py *.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    material: tests for material quality
    stitch: tests for stitching accuracy
    tiles: tests for tile validation
